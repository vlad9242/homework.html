<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card game</title>
<style>
   body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f0f0f0;
      color: #333;
    }
    h1 {
      text-align: center;
    }
    .player {
      margin: 20px 0;
      padding: 15px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    .cards {
      font-size: 24px;
      letter-spacing: 10px;
    }
    .clubs { color: green; }
    .diamonds { color: red; }
    .hearts { color: red; }
    .spades { color: black; }
</style>
</head>
<body>
  <h1>Card game</h1>

  <div class="player">
    <h2>Player 1</h2>
    <p class="cards">
      2<span class="clubs">♣</span>
      9<span class="hearts">♥</span>
      6<span class="hearts">♥</span>
      A<span class="diamonds">♦</span>
      Q<span class="spades">♠</span>
      J<span class="clubs">♣</span>
    </p>
  </div>

  <div class="player">
    <h2>Player 2</h2>
    <p class="cards">
      3<span class="diamonds">♦</span>
      A<span class="clubs">♣</span>
      10<span class="clubs">♣</span>
      K<span class="diamonds">♦</span>
      8<span class="spades">♠</span>
      3<span class="hearts">♥</span>
    </p>
  </div>
</body>
</html>
