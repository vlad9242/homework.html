<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>список</title>
 <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9; /* світлий фон для всієї сторінки */
    }

    ul {
      list-style: none; /* прибираємо стандартні маркери */
      padding: 20px;
      margin: 30px;
      background-color: #ffe6e6; /* світлий фон усього списку */
      border-radius: 8px;
      width: 250px;
    }

    li {
      margin: 10px 0;
      padding: 10px;
      background-color: #ffcccc; /* темніший фон для елементів */
      border-radius: 6px;
    }

    li span {
      background-color: #ff9999; /* найтемніший фон тільки під текстом */
      padding: 5px 10px;
      border-radius: 4px;
      display: inline-block;
    }
  </style>
</head>
<body>
     <ul>
    <li><span>Apple</span></li>
    <li><span>Orange</span></li>
    <li><span>Pineapple</span></li>
    <li><span>Pear</span></li>
    <li><span>Cherry</span></li>
  </ul>
</body>
</html>
