<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
}

.block {
    display: flex;
    position: relative;
    height: 300px;      
    width: 100%;
    overflow: hidden;  
    cursor: pointer;
}
.content {
    flex: 0 0 50%;
    height: 100%;
    display: flex;
    align-items: center;    
    justify-content: center;
    overflow: hidden;    
}
.text-part {
    background-color: #f5f5f5;
    color: #333;
    z-index: 1;
}
.image-part img {
    width: 100%;
    height: 100%;
    object-fit: cover; 
    transition: transform 1s ease;
}
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0);
    transition: background-color 0.3s ease;
    z-index: 2;
    pointer-events: none; 
}


.block:hover .overlay {
    background-color: rgba(0, 0, 0, 0.4);
}

.block:hover .image-part img {
    transform: scale(1.1);
}
    </style>
</head>
<body>
    <div class="block">
        <div class="content text-part">
            <h2>HELLO, WORLD!</h2>
        </div>
        <div class="content image-part">
            <img src="https://picsum.photos/800/600?random=1" alt="">
        </div>
        <div class="overlay"></div>
    </div>

    <div class="block">
        <div class="content image-part">
            <img src="https://picsum.photos/800/600?random=2" alt="">
        </div>
        <div class="content text-part">
            <h2>HELLO, WORLD!</h2>
        </div>
        <div class="overlay"></div>
    </div>
</body>
</html>
