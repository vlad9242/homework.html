<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: grid;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        div {
            position: relative;
            display: grid;
            justify-content: center;
            align-items: center;
            width: 400px;
            height: 200px;
        }
        div:before, div:after {
            content: "";
            position: absolute;
            width: 195px;
            height: 200px;
            border: 5px solid rgb(75, 2, 63);
            transition: 2s;
            transform-origin: left;
            background-color: rgb(120, 12, 118);
        }
        div:after {
            right: 0;
            transform-origin: right;
        }
        div:hover:before {
            transform: perspective(1200px) translateZ(0px) translateX(0px) translateY(0px) rotateY(60deg);
        }
        div:hover:after {
            transform: perspective(1200px) translateZ(0px) translateX(0px) translateY(0px) rotateY(-60deg);
        }

    </style>
</head>
<body>
    <div>
    <p>Hello</p>
    </div>
</body>
</html>
