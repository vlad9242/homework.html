<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            font-size: 0; 
        }

        .product {
            display: inline-block;
            vertical-align: top;
            width: 180px;
            background: white;
            border: 1px solid #999;
            border-radius: 25px;
            padding: 20px;
            margin: 10px;
            box-sizing: border-box;
            font-size: 16px; 
        }

        .product img {
            width: 100px;
            height: 100px;
            display: block;
            margin: 0 auto 15px;
        }

        .name {
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            border-top: 1px solid #ccc;
            padding-top: 15px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>What do I have in my fridge?</h1>

    <div class="container">
        <div class="product">
            <img src="https://img.icons8.com/color/144/pepper.png">
            <div class="name">Pepper</div>
        </div>
        <div class="product">
            <img src="https://img.icons8.com/color/144/apple.png">
            <div class="name">Apple</div>
        </div>
        <div class="product">
            <img src="https://img.icons8.com/color/144/cheese.png">
            <div class="name">Cheese</div>
        </div>
        <div class="product">
            <img src="https://img.icons8.com/color/144/corn.png">
            <div class="name">Corn</div>
        </div>
        <div class="product">
            <img src="https://img.icons8.com/color/144/mushroom.png">
            <div class="name">Mushroom</div>
        </div>
        <div class="product">
            <img src="https://img.icons8.com/color/144/garlic.png">
            <div class="name">Garlic</div>
        </div>
        <div class="product">
            <img src="https://img.icons8.com/color/144/steak.png">
            <div class="name">Beef</div>
        </div>
        <div class="product">
            <img src="https://img.icons8.com/color/144/fish.png">
            <div class="name">Fish</div>
        </div>
        <div class="product">
            <img src="https://img.icons8.com/color/144/fried-eggs.png">
            <div class="name">Eggs</div>
        </div>
        <div class="product">
            <img src="https://img.icons8.com/color/144/parsley.png">
            <div class="name">Coriander</div>
        </div>
    </div>

    <div class="footer">... that's all ...</div>

</body>
</html>
